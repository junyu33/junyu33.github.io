  <script>
  document.addEventListener('DOMContentLoaded', function () {
    if (window.hljs) {
      hljs.highlightAll();
    }

    var a = document.getElementById('mirror-switch');
    if (!a) return;

    var mainHost = 'blog.junyu33.me';
    var cnHost = 'blog-cn.junyu33.me';
    var path = window.location.pathname + window.location.search + window.location.hash;
    var lang = a.getAttribute('data-lang') || 'zh';

    if (window.location.hostname === cnHost) {
      a.href = 'https://' + mainHost + path;
      a.textContent = lang === 'en' ? 'Main Site' : '主站';
    } else {
      a.href = 'https://' + cnHost + path;
      a.textContent = lang === 'en' ? 'CN Mirror' : '国内镜像';
    }
  });
  </script>
